<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://800m.ro/">
    <title>Pagina nu a fost găsită — 800m.ro</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
        }
        .error-page h1 { font-size: 6rem; color: var(--primary-color); margin-bottom: 0; }
        .error-page h2 { font-size: 1.5rem; color: var(--dark-color); margin-top: 0.5rem; }
        .error-page p { color: var(--light-text); margin: 1rem 0; max-width: 500px; }
        .error-page .countdown { font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="error-page">
        <h1>404</h1>
        <h2>Pagina nu a fost găsită</h2>
        <p>Link-ul pe care l-ai accesat nu există sau a fost mutat. Vei fi redirecționat automat către pagina principală în <span class="countdown" id="timer">3</span> secunde.</p>
        <p><a href="https://800m.ro/" class="btn btn-primary">Mergi la pagina principală</a></p>
    </div>
    <script>
        let seconds = 3;
        const timer = document.getElementById('timer');
        setInterval(() => { seconds--; if (seconds >= 0) timer.textContent = seconds; }, 1000);
    </script>
</body>
</html>
